<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viktron Session Bridge</title>
  </head>
  <body>
    <script>
      (function () {
        var TOKEN_KEY = 'viktron_auth_token';
        var USER_KEY = 'viktron_user';

        var params = new URLSearchParams(window.location.search);
        var target = params.get('target') || null;
        var targetOrigin = params.get('targetOrigin') || '*';
        var requestId = params.get('requestId') || null;

        var token = localStorage.getItem(TOKEN_KEY);
        var userRaw = localStorage.getItem(USER_KEY);
        var user = null;

        try {
          user = userRaw ? JSON.parse(userRaw) : null;
        } catch (e) {
          user = null;
        }

        var payload = {
          type: 'VIKTRON_AUTH_BRIDGE_RESULT',
          requestId: requestId,
          token: token,
          user: user,
        };

        if (target) {
          var safeTarget = target;
          try {
            var targetUrl = new URL(target);
            if (targetUrl.protocol === 'https:' && /(^|\.)viktron\.ai$/i.test(targetUrl.hostname)) {
              var hash = new URLSearchParams();
              if (token) hash.set('viktronToken', token);
              if (user) hash.set('viktronUser', encodeURIComponent(JSON.stringify(user)));
              targetUrl.hash = hash.toString();
              safeTarget = targetUrl.toString();
            }
          } catch (e) {
            // ignore parse errors and fall through
          }
          window.location.replace(safeTarget);
          return;
        }

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, targetOrigin);
          return;
        }

        if (window.opener) {
          window.opener.postMessage(payload, targetOrigin);
          window.close();
        }
      })();
    </script>
  </body>
</html>
