<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="900" fill="#0B0F19"/>

  <!-- Title -->
  <text x="40" y="50" fill="#FFFFFF" font-family="sans-serif" font-size="24" font-weight="bold">AgentIRL Architecture</text>
  <text x="40" y="75" fill="#6B7280" font-family="monospace" font-size="12">Multi-Agent Coordination Framework</text>

  <!-- Column headers -->
  <text x="100" y="120" fill="#9CA3AF" font-family="monospace" font-size="11">AGENT FRAMEWORKS</text>
  <text x="520" y="120" fill="#10B981" font-family="monospace" font-size="11">AGENTIRL RUNTIME</text>
  <text x="980" y="120" fill="#9CA3AF" font-family="monospace" font-size="11">BUSINESS SYSTEMS</text>

  <!-- Left Column - Agent Frameworks -->
  <rect x="60" y="150" width="320" height="680" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>

  <!-- Framework boxes -->
  <rect x="80" y="170" width="280" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="100" y="200" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">LangChain</text>
  <text x="100" y="225" fill="#9CA3AF" font-family="monospace" font-size="11">Agent orchestration framework</text>
  <circle cx="330" cy="220" r="4" fill="#10B981"/>

  <rect x="80" y="290" width="280" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="100" y="320" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">CrewAI</text>
  <text x="100" y="345" fill="#9CA3AF" font-family="monospace" font-size="11">Role-based agent collaboration</text>
  <circle cx="330" cy="340" r="4" fill="#10B981"/>

  <rect x="80" y="410" width="280" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="100" y="440" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">LangGraph</text>
  <text x="100" y="465" fill="#9CA3AF" font-family="monospace" font-size="11">Stateful agent workflows</text>
  <circle cx="330" cy="460" r="4" fill="#10B981"/>

  <rect x="80" y="530" width="280" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="100" y="560" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">AutoGen</text>
  <text x="100" y="585" fill="#9CA3AF" font-family="monospace" font-size="11">Conversable agent framework</text>
  <circle cx="330" cy="580" r="4" fill="#10B981"/>

  <rect x="80" y="650" width="280" height="100" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="100" y="680" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">MCP Protocol</text>
  <text x="100" y="705" fill="#9CA3AF" font-family="monospace" font-size="11">Model context protocol</text>
  <circle cx="330" cy="700" r="4" fill="#10B981"/>

  <!-- Center Column - AgentIRL Runtime -->
  <rect x="440" y="150" width="520" height="680" rx="12" fill="#111827" stroke="#10B981" stroke-width="1.5"/>

  <!-- AgentIRL Core components -->
  <rect x="460" y="170" width="480" height="120" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="205" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Workflow Orchestrator</text>
  <text x="480" y="235" fill="#6EE7B7" font-family="monospace" font-size="11">Task delegation · Agent spawning · Coordination</text>
  <path d="M880 200 L920 230 L880 260" stroke="#10B981" stroke-width="2" fill="none"/>

  <rect x="460" y="310" width="480" height="120" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="345" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Policy Engine</text>
  <text x="480" y="375" fill="#6EE7B7" font-family="monospace" font-size="11">Budget caps · Approval gates · Trust boundaries</text>
  <path d="M880 340 L920 370 L880 400" stroke="#10B981" stroke-width="2" fill="none"/>

  <rect x="460" y="450" width="480" height="120" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="485" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Observability Layer</text>
  <text x="480" y="515" fill="#6EE7B7" font-family="monospace" font-size="11">Real-time metrics · Audit logs · OTLP export</text>
  <path d="M880 480 L920 510 L880 540" stroke="#10B981" stroke-width="2" fill="none"/>

  <rect x="460" y="590" width="480" height="120" rx="8" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="625" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">State Manager</text>
  <text x="480" y="655" fill="#6EE7B7" font-family="monospace" font-size="11">Conversation history · Context sharing · Memory</text>
  <path d="M880 620 L920 650 L880 680" stroke="#10B981" stroke-width="2" fill="none"/>

  <!-- Performance badge -->
  <rect x="460" y="740" width="200" height="60" rx="8" fill="#1F2937" stroke="#10B981" stroke-width="1"/>
  <text x="480" y="765" fill="#10B981" font-family="monospace" font-size="14" font-weight="bold">&lt;150ms LATENCY</text>
  <text x="480" y="785" fill="#6B7280" font-family="monospace" font-size="10">P99 orchestration time</text>

  <!-- Right Column - Business Systems -->
  <rect x="1020" y="150" width="320" height="680" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>

  <!-- Business system boxes -->
  <rect x="1040" y="170" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="200" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">CRM (Salesforce)</text>
  <circle cx="1060" cy="210" r="4" fill="#3B82F6"/>

  <rect x="1040" y="270" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="300" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Support (Zendesk)</text>
  <circle cx="1060" cy="310" r="4" fill="#8B5CF6"/>

  <rect x="1040" y="370" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="400" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Data Warehouse</text>
  <circle cx="1060" cy="410" r="4" fill="#F59E0B"/>

  <rect x="1040" y="470" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="500" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Slack / Teams</text>
  <circle cx="1060" cy="510" r="4" fill="#10B981"/>

  <rect x="1040" y="570" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="600" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Email (SendGrid)</text>
  <circle cx="1060" cy="610" r="4" fill="#EC4899"/>

  <rect x="1040" y="670" width="280" height="80" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="1060" y="700" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Payment (Stripe)</text>
  <circle cx="1060" cy="710" r="4" fill="#6366F1"/>

  <!-- Connection lines from left to center -->
  <path d="M360 220 L440 230" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M360 340 L440 370" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M360 460 L440 510" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M360 580 L440 650" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M360 700 L440 650" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Connection lines from center to right -->
  <path d="M960 230 L1040 210" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M960 370 L1040 310" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M960 510 L1040 410" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M960 650 L1040 510" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M960 650 L1040 610" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M960 650 L1040 710" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Flow indicators -->
  <circle cx="400" cy="225" r="6" fill="#10B981" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="370" r="6" fill="#10B981" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Legend -->
  <rect x="60" y="850" width="200" height="30" rx="4" fill="#1F2937"/>
  <circle cx="80" cy="865" r="4" fill="#10B981"/>
  <text x="95" y="870" fill="#9CA3AF" font-family="monospace" font-size="10">Active connection</text>

  <rect x="280" y="850" width="180" height="30" rx="4" fill="#1F2937"/>
  <line x1="295" y1="865" x2="315" y2="865" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="325" y="870" fill="#9CA3AF" font-family="monospace" font-size="10">Agent flow</text>
</svg>
