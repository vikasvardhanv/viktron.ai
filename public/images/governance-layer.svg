<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0B0F19"/>

  <!-- Title -->
  <text x="40" y="50" fill="#FFFFFF" font-family="sans-serif" font-size="24" font-weight="bold">Governance & Trust Layer</text>
  <text x="40" y="75" fill="#6B7280" font-family="monospace" font-size="12">Enterprise-grade compliance and audit trails</text>

  <!-- Main Shield -->
  <g transform="translate(500, 150)">
    <!-- Shield outline -->
    <path d="M100 0 L180 30 L180 120 Q180 180 100 220 Q20 180 20 120 L20 30 Z" fill="#7C3AED" opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Shield inner -->
    <path d="M100 20 L160 45 L160 115 Q160 160 100 190 Q40 160 40 115 L40 45 Z" fill="#7C3AED" opacity="0.2"/>
    <!-- Check mark -->
    <path d="M70 110 L95 140 L135 75" stroke="#A78BFA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- SOC 2 Badge -->
  <rect x="420" y="400" width="160" height="80" rx="12" fill="#1F2937" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="500" y="430" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">SOC 2</text>
  <text x="500" y="450" fill="#A78BFA" font-family="monospace" font-size="11">TYPE II CERTIFIED</text>
  <circle cx="560" cy="440" r="6" fill="#10B981"/>

  <!-- Audit Trail Timeline -->
  <rect x="60" y="520" width="500" height="240" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="80" y="555" fill="#9CA3AF" font-family="monospace" font-size="12">IMMUTABLE AUDIT TRAIL</text>

  <!-- Timeline entries -->
  <rect x="80" y="575" width="10" height="10" rx="2" fill="#8B5CF6"/>
  <line x1="95" y1="580" x2="140" y2="580" stroke="#374151" stroke-width="2"/>
  <text x="150" y="584" fill="#FFFFFF" font-family="monospace" font-size="11">Task Created</text>
  <text x="240" y="584" fill="#6B7280" font-family="monospace" font-size="10">SHA-256: 8f3a2b...</text>

  <line x1="90" y1="585" x2="90" y2="620" stroke="#374151" stroke-width="2"/>
  <circle cx="90" cy="630" r="5" fill="#8B5CF6"/>
  <line x1="95" y1="630" x2="140" y2="630" stroke="#374151" stroke-width="2"/>
  <text x="150" y="634" fill="#FFFFFF" font-family="monospace" font-size="11">Agent Assigned</text>
  <text x="260" y="634" fill="#6B7280" font-family="monospace" font-size="10">SHA-256: 4c9e1f...</text>

  <line x1="90" y1="640" x2="90" y2="675" stroke="#374151" stroke-width="2"/>
  <circle cx="90" cy="685" r="5" fill="#8B5CF6"/>
  <line x1="95" y1="685" x2="140" y2="685" stroke="#374151" stroke-width="2"/>
  <text x="150" y="689" fill="#FFFFFF" font-family="monospace" font-size="11">Action Executed</text>
  <text x="270" y="689" fill="#6B7280" font-family="monospace" font-size="10">SHA-256: 7b2d8a...</text>

  <line x1="90" y1="695" x2="90" y2="730" stroke="#374151" stroke-width="2"/>
  <circle cx="90" cy="740" r="5" fill="#10B981"/>
  <line x1="95" y1="740" x2="140" y2="740" stroke="#374151" stroke-width="2"/>
  <text x="150" y="744" fill="#FFFFFF" font-family="monospace" font-size="11">Audit Logged</text>
  <text x="250" y="744" fill="#6B7280" font-family="monospace" font-size="10">SHA-256: 2e5f3c...</text>

  <!-- Approval Gate -->
  <rect x="640" y="520" width="500" height="240" rx="12" fill="#111827" stroke="#1F2937" stroke-width="1"/>
  <text x="660" y="555" fill="#9CA3AF" font-family="monospace" font-size="12">APPROVAL GATES</text>

  <!-- Gate flow -->
  <rect x="660" y="575" width="180" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="750" y="600" fill="#92400E" font-family="sans-serif" font-size="13" font-weight="bold">Budget Check</text>
  <circle cx="820" cy="605" r="5" fill="#F59E0B"/>

  <path d="M840 605 L880 605" stroke="#374151" stroke-width="2"/>
  <circle cx="890" cy="605" r="5" fill="#10B981"/>

  <rect x="660" y="655" width="180" height="60" rx="8" fill="#DCFCE7" stroke="#10B981" stroke-width="1"/>
  <text x="750" y="680" fill="#065F46" font-family="sans-serif" font-size="13" font-weight="bold">Policy Validated</text>
  <circle cx="820" cy="685" r="5" fill="#10B981"/>

  <path d="M840 685 L880 685" stroke="#374151" stroke-width="2"/>
  <circle cx="890" cy="685" r="5" fill="#10B981"/>

  <rect x="660" y="735" width="180" height="60" rx="8" fill="#DCFCE7" stroke="#10B981" stroke-width="1"/>
  <text x="750" y="760" fill="#065F46" font-family="sans-serif" font-size="13" font-weight="bold">Human Approval</text>
  <circle cx="820" cy="765" r="5" fill="#10B981"/>

  <!-- Stats -->
  <rect x="660" y="575" width="150" height="50" rx="8" fill="#1F2937"/>
  <text x="680" y="595" fill="#9CA3AF" font-family="monospace" font-size="10">APPROVALS TODAY</text>
  <text x="680" y="615" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">847</text>

  <rect x="840" y="575" width="150" height="50" rx="8" fill="#1F2937"/>
  <text x="860" y="595" fill="#9CA3AF" font-family="monospace" font-size="10">POLICY VIOLATIONS</text>
  <text x="860" y="615" fill="#10B981" font-family="sans-serif" font-size="20" font-weight="bold">0</text>

  <rect x="660" y="655" width="150" height="50" rx="8" fill="#1F2937"/>
  <text x="680" y="675" fill="#9CA3AF" font-family="monospace" font-size="10">AUDIT ENTRIES</text>
  <text x="680" y="695" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">2.4M</text>

  <rect x="840" y="655" width="150" height="50" rx="8" fill="#1F2937"/>
  <text x="860" y="675" fill="#9CA3AF" font-family="monospace" font-size="10">RETENTION</text>
  <text x="860" y="695" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">7 YR</text>

  <!-- Feature badges -->
  <rect x="60" y="180" width="280" height="70" rx="10" fill="#1F2937" stroke="#8B5CF6" stroke-width="1"/>
  <text x="80" y="210" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">Task-Scoped Tokens</text>
  <text x="80" y="232" fill="#9CA3AF" font-family="monospace" font-size="11">Least-privilege delegation</text>

  <rect x="60" y="270" width="280" height="70" rx="10" fill="#1F2937" stroke="#8B5CF6" stroke-width="1"/>
  <text x="80" y="300" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">Budget Enforcement</text>
  <text x="80" y="322" fill="#9CA3AF" font-family="monospace" font-size="11">Hard caps per agent/task</text>

  <rect x="60" y="360" width="280" height="70" rx="10" fill="#1F2937" stroke="#8B5CF6" stroke-width="1"/>
  <text x="80" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">GDPR Compliant</text>
  <text x="80" y="412" fill="#9CA3AF" font-family="monospace" font-size="11">Data residency controls</text>

  <rect x="60" y="450" width="280" height="70" rx="10" fill="#1F2937" stroke="#8B5CF6" stroke-width="1"/>
  <text x="80" y="480" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">100% Action Logging</text>
  <text x="80" y="502" fill="#9CA3AF" font-family="monospace" font-size="11">Every agent action recorded</text>

  <!-- Connection lines -->
  <path d="M340 215 L380 215" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M380 215 L380 440" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M380 440 L420 440" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Status indicator -->
  <circle cx="1140" cy="40" r="6" fill="#10B981"/>
  <text x="1080" y="44" fill="#10B981" font-family="monospace" font-size="11">GOVERNANCE ACTIVE</text>
</svg>
