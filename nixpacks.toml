# Nixpacks configuration for Viktron
# This configures the build process for Vite frontend + Express backend

[phases.setup]
# nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start:server"

[variables]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=4096"
NIXPACKS_PROVIDER = "node"
